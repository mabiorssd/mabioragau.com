<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0e14"/>
  
  <!-- Grid pattern -->
  <g opacity="0.06">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>

  <!-- Green glow top -->
  <rect x="0" y="0" width="1200" height="2" fill="#00ff88" opacity="0.5"/>
  <rect x="0" y="0" width="1200" height="2" fill="#00ff88" opacity="0.2" style="filter: blur(8px)"/>

  <!-- Decorative corner brackets -->
  <g stroke="#00ff88" stroke-width="2" opacity="0.3">
    <path d="M 40 40 L 40 70" />
    <path d="M 40 40 L 70 40" />
    <path d="M 1160 40 L 1160 70" />
    <path d="M 1160 40 L 1130 40" />
    <path d="M 40 590 L 40 560" />
    <path d="M 40 590 L 70 590" />
    <path d="M 1160 590 L 1160 560" />
    <path d="M 1160 590 L 1130 590" />
  </g>

  <!-- Top bar label -->
  <text x="600" y="60" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ff88" opacity="0.5" letter-spacing="6">SECURITY_OPERATOR // OG_CARD</text>

  <!-- Shield icon -->
  <g transform="translate(600, 160)">
    <path d="M0 -50 L40 -30 L40 20 C40 60 20 80 0 90 C-20 80 -40 60 -40 20 L-40 -30 Z" fill="none" stroke="#00ff88" stroke-width="2.5" opacity="0.8"/>
    <path d="M-15 -10 L-5 5 L15 -20" fill="none" stroke="#00ff88" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="600" y="290" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', sans-serif" font-size="64" font-weight="700" fill="#f0f0f0" letter-spacing="4">MABIOR AGAU</text>

  <!-- Subtitle -->
  <g transform="translate(600, 350)">
    <text x="0" y="0" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#00ff88" opacity="0.7" letter-spacing="2">Offensive Security &amp; Penetration Testing</text>
  </g>

  <!-- Divider line -->
  <line x1="400" y1="380" x2="800" y2="380" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
  <line x1="450" y1="382" x2="750" y2="382" stroke="#00ff88" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="384" x2="700" y2="384" stroke="#00ff88" stroke-width="1" opacity="0.08"/>

  <!-- Bottom details -->
  <g transform="translate(600, 430)" font-family="'Courier New', monospace" font-size="13" fill="#888" opacity="0.6" letter-spacing="1.5">
    <text x="0" y="0" text-anchor="middle">Juba, South Sudan — National Communication Authority</text>
  </g>

  <!-- Bottom badge -->
  <g transform="translate(600, 480)">
    <rect x="-80" y="-14" width="160" height="28" rx="14" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00ff88" opacity="0.6" letter-spacing="3">NCA · TIER-3 CLEARANCE</text>
  </g>

  <!-- Bottom status line -->
  <text x="600" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00ff88" opacity="0.2" letter-spacing="4">MABIORAGAU.COM // ALL SYSTEMS OPERATIONAL</text>
</svg>
